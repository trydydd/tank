  - id: S6
    title: HTML-to-markdown library selection for URL fetch
    status: done
    outcome: |
      Selected markdownify (MIT, v1.2.2+) with BeautifulSoup4 for HTML→markdown
      conversion. Pipeline: decompose boilerplate tags (nav, header, footer, aside,
      script, style) then extract <main>/<article>/role="main" content, convert with
      markdownify(heading_style="ATX"), strip pilcrow anchor links (¶), collapse
      blank lines. BeautifulSoup4 is already a markdownify dependency — no additional
      transitive dep cost. Implemented in src/synd/builder/fetch.py as html_to_markdown().
      Added markdownify>=1.0 to core dependencies in pyproject.toml (builder persona,
      not serve persona — URL fetch is a synd build feature).

      Evaluated against ReadTheDocs (requests.readthedocs.io/en/latest/user/quickstart/):
      - markdownify: clean fenced code, pipe tables, no nav bleed — winner
      - trafilatura: inline code fragmentation (backtick spans broken by newlines) — rejected
      - html2text: indented (4-space) code blocks, incompatible with chunker fence detection — rejected

      The existing scripts/llms_full_to_markdown.py handles the MDX/Mintlify path
      (strip_mdx + MarkdownExtractor). That pipeline is stdlib-only and targets
      llms-full.txt or .md endpoint content — a different input type than rendered HTML.
      It is kept as reference; its strip_mdx() and _extract_code_fences() functions are
      candidates for promotion to src/synd/builder/mdx.py in S8.
    context: |
      tank build --source <url>/llms-full.txt (v0.2.0) needs to fetch HTML doc pages
      and convert them to clean text for chunking. This must work without an LLM —
      the conversion must be deterministic, reproducible, and free of network
      dependencies at build time beyond the initial fetch. WebFetch (Claude's tool)
      uses html_extraction_method: "markdown" but requires a model in the loop and
      cannot be used in tank build. A Python library is required.
      Candidates: html2text, markdownify, trafilatura.
    task: |
      Evaluate html2text, markdownify, and trafilatura against these criteria:
      - Output quality: does it strip nav, headers, footers, sidebars cleanly?
      - Code block preservation: are fenced blocks and inline code intact?
      - Table handling: are markdown tables produced or collapsed to plain text?
      - Maintenance status and dependency weight
      - License compatibility with Tank (MIT/Apache preferred)
      Test each against a rendered HTML page from requests.readthedocs.io and the
      fastmcp docs site. Compare output quality for a page with mixed prose, code
      blocks, and a navigation sidebar.
    success: |
      A library recommendation with sample output from both test pages. Enough
      detail to wire it into src/tank/builder/fetch.py without further research.
    files:
      - src/tank/builder/fetch.py
      - src/tank/builder/build.py
      - docs/decisions.md
    blocked_by: []

  - id: S7
    title: Custom markdown chunker implementation (markdown-it-py)
    status: done
    outcome: |
      Implemented in v0.2.0 (feature/chunker). src/synd/builder/chunking.py
      rewritten as a markdown-it-py token walker. Splits at all heading levels
      H1-H6; heading_path built by construction via ancestor stack; code fences
      atomic (fence token is self-contained in markdown-it-py); paragraph overflow
      splits at next paragraph boundary when section exceeds max_chunk_tokens
      (default 500). chunkana removed from pyproject.toml; markdown-it-py>=3.0
      added. _DeduplicateFilter workaround removed. 21 new tests added covering
      heading ancestry, fence atomicity, overflow, and fastmcp fixture regression
      (Transport Protocols section now 4 separate ### chunks, no 932-token blob).
      S2 (heading-aware summary) implemented in the same pass.
    context: |
      chunkana splits only at ## level; all ### subsections stay together. Library
      survey (S1) found no off-the-shelf replacement without heavy dependencies.
      Decision (D14): build a custom chunker using markdown-it-py 3.0.0+ as the
      parsing backend. markdown-it-py tokenises a CommonMark document into a flat
      token stream where heading tokens carry their level (1-6) and fence tokens
      mark code block open/close boundaries. This makes correct heading_path
      construction and code-fence atomicity straightforward.
    task: |
      Implement src/tank/builder/chunking.py replacing the chunkana-based
      process_file() with a markdown-it-py-backed implementation:
      - Parse the file with markdown_it.MarkdownIt().parse(text)
      - Walk the token stream: on each heading_open token, emit the current
        accumulated chunk (if any), push heading text onto the ancestor stack,
        trim the stack to the current heading level
      - heading_path = " / ".join(ancestor_stack) — built by construction
      - Treat fence_open..fence_close spans as atomic: never start a new chunk
        inside a code fence
      - When accumulated content exceeds max_chunk_tokens (default 500), split
        at the next blank-line boundary (paragraph split), not mid-paragraph
      - Preamble content before the first heading becomes a chunk with
        heading_path = source filename prefix (current behaviour preserved)
      - generate_summary() call site in build.py: pass heading_path through
        (required for D13 once S2 is implemented; wire the parameter now even
        if D13 is not implemented yet)
      Remove chunkana from pyproject.toml dependencies once replaced.
      Add markdown-it-py>=3.0 to core dependencies (not build extra — chunking
      is required for tank build which is already in the build extra, but
      markdown-it-py is pure Python and lightweight enough for the base install).
    success: |
      All existing tests pass. The fastmcp benchmark chunk 5 (currently 932 tokens,
      six ### sections) is split into per-section chunks. heading_path for a ###
      section correctly includes the ## and # ancestor headings. Code fence content
      is never split across chunks. chunkana removed from dependencies.
    files:
      - src/tank/builder/chunking.py
      - src/tank/builder/build.py
      - pyproject.toml
      - tests/test_builder/
      - tests/benchmarks/test_webfetch_vs_tank.py
      - docs/decisions.md
    blocked_by: []

  - id: S8
    title: Web page to markdown conversion — library, pipeline, and output format research
    status: done
    outcome: |
      Five decisions settled (see decisions.md D21):
      1. Output format: CommonMark markdown — preserves heading structure for the S7 chunker.
      2. HTTP library: urllib.request (stdlib) — httpx ruled out (pre-1.0, same as D15).
      3. Content routing: URL ends in .md → MDX strip path; otherwise → HTML path.
      4. MDX stripping: regex-based covering the confirmed Mintlify tag set; no new deps.
      5. Rate limiting: configurable sleep, default 0.5s.

      Implemented:
      - src/synd/builder/mdx.py — strip_mdx(), unwrap_jsx_blocks(), clean_heading(),
        process_mdx(). Promoted and extended from scripts/llms_full_to_markdown.py.
      - src/synd/builder/llms_full.py — parse_llms_txt(), fetch_pages(), LlmsPage.
      - src/synd/builder/fetch.py extended with fetch_page(url, *, rate_limit_sleep).
      - 34 new tests in tests/test_builder/test_mdx.py, test_fetch.py, test_llms_full.py.
      Next: wire fetch_pages() into build.py to support synd build --source <url>/llms.txt.
    context: |
      tank build --source <url>/llms.txt (v0.2.0 roadmap) fetches individual doc
      pages and must convert them to a clean intermediate format for the chunker.
      S6 covers HTML-to-markdown library selection for the raw conversion step, but
      the full pipeline involves more: HTTP fetch with rate limiting and User-Agent,
      content extraction (stripping nav/sidebar/footer boilerplate), format conversion,
      and MDX/JSX callout tag handling (Mintlify sites use <Tip>, <Note>, <Warning>
      etc. that must be unwrapped to their inner text).
      The quality of this pipeline directly determines heading_path accuracy and
      summary quality in the resulting pack — garbage in, garbage chunks out.
      The fastmcp and MCP packs built from llms-full.txt demonstrate the problem:
      JSX components in headings produce heading_path values like
      'ClassName <sup><a href="..."><Icon /></a></sup>'.
      An open question is whether the intermediate format should be markdown, plain
      text, or something else — this choice affects the chunker interface, heading
      detection, code fence handling, and FTS5 index quality.

      KNOWN MINTLIFY BEHAVIOUR — .md links in llms.txt:
      Mintlify-hosted doc sites (FastMCP, MCP spec, Prisma, etc.) already include
      .md URLs in their llms.txt index — no URL manipulation required. Example from
      modelcontextprotocol.io/llms.txt:
        - [Build an MCP server](https://modelcontextprotocol.io/docs/develop/build-server.md)
      Fetching those .md URLs returns markdown directly — no HTML-to-markdown
      conversion library needed. However the content is MDX, not clean CommonMark.
      JSX components are present in the raw .md response and must be stripped:
        <Frame><img .../></Frame>   → discard (image, not text content)
        <Note>...</Note>            → keep inner text, discard wrapper
        <Tabs><Tab title="Python">  → keep inner text, discard wrapper
        <Warning>...</Warning>      → keep inner text, discard wrapper
      Heading pollution (ClassName <sup><a href="..."><Icon /></a></sup>) also
      originates from MDX source and must be cleaned the same way.
      S6 (HTML-to-markdown library) remains needed only for non-Mintlify sites
      (ReadTheDocs, Docusaurus, etc.) that serve HTML at their page URLs.
    task: |
      Research and recommend a complete fetch-and-convert pipeline for
      tank build --source <url>/llms.txt:
      1. Output format decision: should pages be normalised to markdown, plain text,
         or another format before chunking? Consider:
         - Markdown preserves heading structure (##, ###) that the chunker (S7) uses
           to build heading_path — converting to plain text loses this signal entirely.
         - Plain text is simpler and avoids markdown formatting noise in FTS5 content,
           but requires a separate heading extraction pass.
         - A structured intermediate (e.g. list of {heading_level, heading_text,
           body_text} dicts) decouples extraction from chunking but changes the
           chunker interface.
         - The existing local-file pipeline uses raw markdown files; the URL pipeline
           should produce equivalent input so the same chunker handles both paths.
         Recommend a format with clear rationale. If markdown, specify what markdown
         flavour (CommonMark) and what non-content elements must be stripped first.
      2. HTTP fetch: evaluate httpx vs requests for async/sync tradeoffs; confirm
         rate limiting approach (token bucket or simple sleep); User-Agent policy.
      3. Mintlify .md behaviour: llms.txt already contains .md URLs — fetch them
         directly (no URL manipulation). Characterise the MDX content: which JSX
         components appear (confirmed: <Frame>, <Note>, <Tabs>, <Tab>, <Warning>,
         <img> inside frames); which carry inner text to preserve vs. which are
         pure presentational and should be discarded. Produce a regex or parser
         approach that handles the confirmed tag set cleanly. This path has no
         HTML-to-markdown step — S6 is not needed for Mintlify sites.
      4. Content extraction for non-Mintlify sites: evaluate trafilatura vs
         readability-lxml vs BeautifulSoup manual extraction for stripping
         nav/sidebar/footer. Test against: a ReadTheDocs site
         (requests.readthedocs.io), a Docusaurus site.
      5. HTML-to-markdown for non-Mintlify sites: build on S6 outcome if resolved;
         otherwise evaluate markdownify vs html2text vs trafilatura's built-in
         markdown output.
      6. MDX/JSX tag handling (fallback for llms-full.txt or non-.md-endpoint
         Mintlify content): what regex or parser approach cleanly strips
         <Tip>, <Note>, <Warning>, <FeatureBadge />, <Icon />, inline
         <sup><a href="...">...</a></sup> — keeping inner text, discarding
         component wrappers.
      Produce a recommended pipeline with the specific library versions, a
      code sketch of the fetch-and-convert function, and sample output from
      the test sites.
    success: |
      A recommended output format with rationale (markdown vs plain text vs
      structured intermediate). Mintlify .md endpoint confirmed (or refuted) with
      sample output. A recommended pipeline with library choices justified against
      the test sites. A code sketch of fetch_page(url: str) -> str (returns
      normalised text ready for the chunker). Enough detail to implement
      src/tank/builder/fetch.py without further research.
    files:
      - src/tank/builder/fetch.py
      - src/tank/builder/llms_full.py
      - src/tank/builder/build.py
      - docs/decisions.md
    blocked_by: [S6]

  - id: S10
    title: Minimum-token merge — absorb stub chunks into neighbours
    status: done
    outcome: |
      Implemented as an internal chunker guard in chunk_content() rather than a
      post-processing pass. When a heading boundary would produce content below
      min_chunk_tokens (default 20), the emit is skipped and chunk_start_line is
      not advanced — the stub content carries forward and is absorbed by the next
      section at its next emit. heading_path reflects the absorbing (deeper)
      section; stub heading text appears in merged content for BM25 scoring.
      Threshold: 20 tokens (stubs <10t, legit short intros 15-30t). Disableable
      via min_chunk_tokens=0. See D23 in decisions.md.
    context: |
      The MCP pack analysis (feature/chunker) found 249 stub chunks (<10 tokens)
      across 2,089 total chunks. These arise when a heading in the source is
      immediately followed by another heading (no prose between them) — e.g.:
        ## Authorization
        ### Introduction
      The chunker emits a chunk for "## Authorization" with content = "## Authorization"
      and token_count = 2–5 tokens. This chunk:
        - Contributes nothing to BM25 that the heading_path field doesn't already carry.
        - Inflates result counts in search responses with near-zero-information entries.
        - Cannot be surfaced usefully by fetch — the content IS the heading.
      The same pattern produces very small preamble chunks (e.g., a 3-token page
      intro sentence) that would be better merged with the following section.
      A min-token threshold (e.g. 20 tokens) with a merge-forward pass would absorb
      these stubs into the next chunk with the same heading_path ancestry, or
      failing that into the previous chunk.
    task: |
      Design and implement a post-chunking merge pass in chunking.py:
      1. Threshold: what is the right min_chunk_tokens value? Consider: stub chunks
         are almost always <10t; legitimate short sections (a one-sentence intro
         before a code block) are typically 15–30t. Recommend a default and whether
         it should be a CLI param (--min-chunk-tokens).
      2. Merge direction: when a stub is found, should it be merged into:
         a. The NEXT chunk (merge-forward) — preserves heading context but may
            produce a heading + unrelated intro combo.
         b. The PREVIOUS chunk (merge-back) — the stub's heading becomes part of
            the prior section.
         c. Both, with preference: forward if next chunk shares heading ancestry,
            otherwise backward.
         Analyse the MCP stub distribution to determine which direction produces
         better chunks in practice. Use the charter page (33 stubs) as a test case.
      3. heading_path after merge: when two chunks are merged, which heading_path
         wins? Options: keep the parent, keep the child, concatenate. Consider
         FTS5 impact — heading_path is 2.5× weighted; a merged path that drops
         a child heading loses search precision.
      4. Interaction with oversized chunks (S9): a merge pass that runs before the
         overflow split could push a near-threshold chunk over the limit. Recommend
         a run order (split first, merge second) and confirm it avoids this.
      5. Edge cases: a page that consists entirely of stubs (e.g. a pure TOC page);
         a stub that is the only chunk on a page; two consecutive stubs.
      Validate against the MCP pack: after the merge pass, stub count (<10t) should
      drop from 249 to near 0. The charter page (33 stubs, 60 sections) is the
      primary regression test.
    success: |
      A merge algorithm recommendation with direction policy, heading_path handling,
      and threshold value. A code sketch of the merge pass function. Edge cases
      covered. Enough detail to implement in chunking.py without further research.
    files:
      - src/synd/builder/chunking.py
      - src/synd/cli/build.py
      - docs/decisions.md
    blocked_by: []

  - id: S11
    title: Non-Mintlify llms-full.txt format support
    status: open
    outcome: null
    context: |
      synd build --source <url>/llms-full.txt currently only handles the Mintlify
      format, which delimits pages with "Source: <url>" boundary lines. During
      benchmark corpus construction (59 packs, 100K chunks from directory.llmstxt.cloud)
      we discovered that a significant fraction of major documentation sites use
      incompatible formats and produce "No pages found" errors:

        - Cloudflare (developers.cloudflare.com): YAML frontmatter blocks (--- ... ---)
          as page separators, no "Source:" lines
        - Svelte (svelte.dev): single flat file opening with <SYSTEM> tag, no page
          boundaries
        - GenAIScript (microsoft.github.io/genaiscript): empty or non-standard format
        - Mintlify itself (mintlify.com/docs): redirects, non-parseable
        - BuildWithFern, Codeium, Dynamic, Clerk, Apify, Commerce Layer, Zep: all
          returned 0 "Source:" lines; formats unconfirmed

      Cloudflare is the highest-value miss — it has extensive developer documentation
      (Workers, Pages, AI, R2, D1, KV, Queues, etc.) that would be extremely useful
      to index, and the YAML frontmatter format is clearly structured and parseable.
      Svelte's <SYSTEM> tag file is a different but also regular format.

      The current llms_full.py preprocessor (src/synd/builder/llms_full.py) has a
      single parse_llms_full_txt() function that splits on "Source: " lines. It has
      no format detection or fallback.
    task: |
      Survey the incompatible formats encountered and design a format-detection
      strategy for build_pack_from_url() when given an llms-full.txt URL:

      1. Confirm the exact format of each incompatible site by fetching samples:
         - Cloudflare: how does each "page" start? Is the separator always "---\ntitle:"?
           Does the YAML block contain a canonical URL field usable as source_url?
         - Svelte: is there any page-level boundary at all, or is it one giant flat file?
           If flat, how should it be chunked? (Single source document with heading-based
           splitting, analogous to a local .md file.)
         - At least 2 others from the zero-Source list to characterise the spread.

      2. Recommend a format detection approach:
         - Auto-detect from content (e.g. "starts with ---\ntitle:" → YAML frontmatter
           format; "starts with <SYSTEM>" → flat file; "contains Source: lines" →
           existing Mintlify path)?
         - Explicit --format flag on synd build?
         - Or detect automatically with a --format override escape hatch?

      3. Scope the implementation for the Cloudflare YAML frontmatter format:
         - Extract source_url from each page's frontmatter (likely the "url" or
           "canonical" key, or derived from the "title" + directory structure)
         - Extract page title from frontmatter "title" key
         - Pass page body (after the closing ---) to the existing chunker pipeline
         - Estimate effort in lines of new code

      4. Consider the flat-file case (Svelte-style): should a flat llms-full.txt
         with no page boundaries be treated as a single source document chunked by
         heading? If so, source_url = the llms-full.txt URL itself; heading_path
         values are relative to the file's structure.

      The spike is complete when: format coverage is characterised, a detection
      strategy is recommended, and the Cloudflare YAML case has a concrete
      implementation sketch.
    success: |
