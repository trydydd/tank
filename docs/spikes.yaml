  - id: S9
    title: Chunk size gate — warning threshold and oversized chunk handling
    status: done
    outcome: |
      Implemented warn-only strategy (D24). Default max_chunk_tokens raised 500 → 800
      (code-heavy SDK docs benefit from larger prose budget). warn_chunk_tokens defaults
      to 2× max (1,600t at defaults). Three new synd build CLI params:
      --max-chunk-tokens, --min-chunk-tokens, --warn-chunk-tokens. No automatic
      splitting of structural tokens (code_block, table, fence) — incoherent fragments
      are worse than one large chunk; noise filter already handles the canonical case
      (changelog pages). See D24 in decisions.md.
    context: |
      The paragraph overflow split in the custom chunker fires when accumulated
      content exceeds max_chunk_tokens (default 500 tokens, ~2000 chars). However
      some content structures bypass this check entirely:
      - Changelog pages formatted as indented code blocks (4-space indent) produce
        a single `code_block` token instead of `paragraph_open`/`paragraph_close`
        pairs, so the overflow guard never fires. The fastmcp `updates` page is a
        confirmed example: 5,707 tokens in one chunk.
      - Very long fenced code blocks are always kept atomic by design (fence
        atomicity invariant). A single fence could exceed max_chunk_tokens with
        no split.
      - Tables (single `table` token in markdown-it-py) have the same problem as
        code_block — no paragraph boundary to split at.
      These oversized chunks degrade BM25 ranking because they contain many
      unrelated terms, elevating on nearly every query (noise).
      A size gate — either a build-time warning or an automatic split — is needed
      to surface or mitigate the issue. The URL noise filter (S8/feature/chunker)
      addresses the changelog page problem upstream, but the underlying issue
      remains for any content that legitimately exceeds 500 tokens.
    task: |
      Research and recommend a strategy for chunks that exceed a size threshold
      after the heading-based and paragraph-overflow splits:
      1. Thresholds: what is the right warning threshold (e.g. 1000 tokens)?
         What is the right hard cap (if any) before a chunk is split regardless
         of structure? Should these be configurable CLI params?
      2. Warning vs. split: should `synd build` emit a warning and continue, or
         should it attempt a fallback split (e.g. split at blank lines regardless
         of paragraph token type, or split mid-code-block at line boundaries)?
         Consider the user experience: a silent 5000-token chunk is worse than a
         noisy split mid-fence.
      3. Fence atomicity trade-off: the current invariant is "never split a fence."
         Is there a safe way to split very long fences (e.g. at top-level function
         boundaries in code) while preserving the atomicity guarantee for short ones?
         Or should fence atomicity always hold and only warnings be emitted?
      4. Metrics: what build output would help pack authors diagnose oversized chunks?
         E.g. "3 chunks exceed 1000 tokens — run `synd inspect` to review."
      Validate the recommendation against the fastmcp `updates` page (5,707 tokens)
      and at least one legitimate long code example (expected: warning only, no split).
    success: |
      A recommended strategy (warn vs. split vs. both) with threshold values and
      rationale. A code sketch of the detection logic in chunking.py. A recommendation
      on whether fence atomicity should ever be broken. Enough detail to implement
      without further research.
    files:
      - src/synd/builder/chunking.py
      - src/synd/cli/build.py
      - docs/decisions.md

  - id: S12
    title: Search API return type contract — structured response vs bare list
    status: done
    outcome: |
      Industry pattern (Elasticsearch, Algolia, Typesense, MeiliSearch) is unanimous:
      search functions return a structured response object, never a bare list. The
      structured response always includes: (1) the result set, (2) a total/count field,
      (3) the processed query string. Invalid inputs raise exceptions; the response
      type is only returned for successful queries.

      Key finding: the internal return type and the MCP serialization are separate
      concerns. A rich internal SearchResponse does not mandate token-heavy MCP output —
      the server layer controls what is serialized over the wire.

      Resolution (D27): replace list[SearchResult] with SearchResponse(results,
      query_used). Raise SearchError for all inputs that produce no searchable terms
      (empty, all-special-chars, all-stopwords). The MCP server omits query_used from
      the wire format when it equals the raw input query (no preprocessing effect),
      keeping the common case token-efficient. See decisions.md D27.
    context: |
      search() in src/synd/search/fts.py returns list[SearchResult]. A bare list is
      ambiguous: the caller cannot distinguish "valid query, nothing in the index",
      "valid query, nothing matched", "empty input", or "query was all stopwords".
      The only unambiguous signal would be an exception — but that conflates "no
      results" with "bad query". The question is whether a structured return type
      is appropriate and what fields it should carry without adding MCP token cost.
    task: |
      Survey how major search APIs (Elasticsearch, Algolia, Typesense, MeiliSearch,
      Whoosh, Xapian) handle this contract. Determine: (1) bare list vs structured
      response, (2) how "no results" is communicated, (3) how invalid queries are
      signalled, (4) what metadata fields are standard, (5) how to keep MCP
      serialization lean while the internal type is rich.
    success: |
      A clear return type contract with rationale, a list of fields with justification
      for each, and guidance on MCP serialization. Enough to implement without further
      research.
    files:
      - src/synd/search/fts.py
      - src/synd/server.py
      - docs/decisions.md
    blocked_by: []
