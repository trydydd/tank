# Research spikes — open questions requiring investigation before implementation.
# Each spike is self-contained: a subagent can be handed a single entry with no
# other context needed.
# status: open | in_progress | done

spikes:

  - id: S1
    title: Markdown chunker replacement — library survey
    status: done
    outcome: |
      No off-the-shelf library is a clean drop-in. chunknorris 1.2.2 meets all
      requirements but carries PyMuPDF, pandas, and matplotlib for parsers Tank
      will never use (~30MB). langchain-text-splitters 1.1.2 is lighter but heading_path
      returns as a flat dict and has no paragraph overflow splitting. Decision (D14):
      build a custom chunker using markdown-it-py 3.0.0+ as the parsing backend.
      MIT-licensed, zero extra dependencies, ~250 lines reference implementation in
      chunknorris. See S7 for implementation work.
    context: |
      chunkana splits only at ## level; all ### subsections stay together, producing
      coarse multi-section chunks. The section_tags workaround is the ceiling of what
      chunkana can give. semchunk has been evaluated and ruled out — no heading
      awareness, token-counter-driven, would reproduce the multi-section problem.
      See decisions.md D14.
    task: |
      Survey available Python markdown chunking libraries against these criteria:
      splits at heading boundaries at all levels (##, ###, deeper); treats fenced
      code blocks as atomic; no heavy dependencies (no PyTorch, no LLM calls at
      build time); actively maintained; handles preamble, deeply nested headings,
      and oversized sections. If no library qualifies, scope the custom chunker
      described in D14 (~150 lines). Benchmark any candidate against
      tests/benchmarks/fixtures/ to confirm multi-section chunks like the 932-token
      chunk 5 in the fastmcp fixture are resolved.
    success: |
      A library recommendation with benchmark results against the fastmcp fixture,
      or a scoped custom implementation plan with line count estimate and test approach.
    files:
      - src/tank/builder/chunking.py
      - tests/benchmarks/test_webfetch_vs_tank.py
      - docs/decisions.md
    blocked_by: []

  - id: S2
    title: Heading-aware summary heuristic
    status: open
    context: |
      generate_summary() picks the first sentence of raw chunk content. Fails when
      a chunk opens with a code block or bridging sentence — the summary describes
      the transition, not the subject. heading_path is already computed before
      _generate_summary() is called in chunking.py; it just is not passed through.
      See decisions.md D13.
    task: |
      Implement and test: generate_summary(content, heading_path) -> str
      Logic: prefix with leaf heading node + ": " + first prose sentence.
      Edge cases: no heading (preamble) falls back to first-sentence only; heading
      equals page title skips the prefix; heading over 60 chars uses leaf node only;
      chunk opens with a list or code block skips to next prose sentence.
      Validate against the fastmcp fixture: chunk 2 summary must include "run()" or
      "STDIO"; existing informative summaries (chunks 3 and 5) must not degrade.
      No schema changes — summary remains a plain string.
    success: |
      Passing tests covering all edge cases. Chunk 2 gains a heading signal.
      Preamble chunks degrade gracefully.
    files:
      - src/tank/builder/chunking.py
      - tests/test_builder/
      - docs/decisions.md
    blocked_by: []

  - id: S3
    title: "query-docs tool split: search / fetch"
    status: done
    outcome: |
      Implemented in v0.2.0 (feature/mcp branch). query-docs replaced with two tools:
      search (summaries + chunk_ids, never full content) and fetch (full content by
      chunk_ids, no query). tank serve CLI command added. See decisions.md D12 and
      docs/MCP.md for full documentation.
    context: |
      detail="full" on query-docs nudges agents toward expensive single-step queries
      without a prior relevance pass. The architectural fix is two tools: search-docs
      (summaries only, no chunk_ids) and fetch-docs (full content by chunk_ids only,
      no query). Deferred because it is a breaking change to any existing MCP client
      config. See decisions.md D12.
    task: |
      Produce a concrete migration plan: what changes in src/tank/server.py to register
      two tools; what happens to query-docs (deprecated alias or removed); what MCP
      client config changes consumers need; whether FastMCP supports registering a
      deprecated tool alongside its replacements. Estimate scope in lines changed.
    success: |
      A migration plan covering server.py changes, client config impact, deprecation
      strategy, and effort estimate. Enough detail to implement without further research.
    files:
      - src/tank/server.py
      - docs/MCP.md
      - docs/decisions.md
    blocked_by: []

