      - test_name: "test_pull_force_does_not_skip_verify"
        description: "--force allows reimport of an existing version, but does NOT skip the 8-step verification. A tampered .ctx with --force must still be rejected."
        must_not: "pull --force with a tampered .ctx exits 0"
      - test_name: "test_query_does_not_crash_on_empty_db"
        description: "tank query with no imported packs should return an empty result set and exit 0, not crash or exit 1."
        must_not: "exit_code != 0 or traceback in output when database is empty"

