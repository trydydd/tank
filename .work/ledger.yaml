  # ---------------------------------------------------------------------------
  - id: "chunk-06-search-layer"
    title: "FTS5 search with BM25 ranking and attribution"
    status: DONE
    depends_on: ["chunk-04-storage-layer"]
    token_budget_hint: small

    local_context: |
      Tank's search is SQLite FTS5 with BM25 ranking. The search module lives in
      src/tank/search/fts.py. It queries the chunks_fts virtual table and joins
      back to chunks and packages to include full provenance metadata on every result.

      The exact SQL query is in docs/architecture.md under "Search: FTS5 with Attribution".
      Key behaviors:
        - Revoked packs are always excluded (AND p.lifecycle_state != 'revoked')
        - Results can be filtered by package name and/or version
        - Two detail levels: 'summary' (heading_path, summary, score, source_url,
          lifecycle_state) and 'full' (adds content)
        - chunk_ids parameter allows fetching specific chunks by ID (bypasses search)
        - If a queried package is not indexed, return an explicit not_indexed status
        - Deprecated packs include a lifecycle_warning in results

    objective: |
      search() and get_chunks_by_id() are callable. search() returns BM25-ranked
      results with full attribution from the packages table. Revoked packs are
      excluded. Package filtering works. Both detail levels work. Deprecated
      results carry lifecycle_warning.

    interface_contract:
      inputs:
        - path: "src/tank/storage/db.py"
          consumes: [Database]
        - path: "src/tank/storage/models.py"
          consumes: [Chunk, Pack]
        - path: "src/tank/errors.py"
          consumes: [TankError]
      outputs:
        - path: "src/tank/search/fts.py"
          exports:
            - |
              @dataclass
              class SearchResult:
                  chunk_id: int
                  package: str
                  version: str
                  heading_path: str | None
                  summary: str | None
                  content: str | None  # None when detail='summary'
                  source_url: str | None
                  source_commit: str | None
                  content_hash: str | None
                  lifecycle_state: str
                  doc_version_status: str | None
                  indexed_at: str
                  score: float
                  lifecycle_warning: str | None  # set when lifecycle_state == 'deprecated'
            - "def search(db: Database, query: str, packages: list[str] | None = None, detail: str = 'summary', limit: int = 10) -> list[SearchResult]"
            - "def get_chunks_by_id(db: Database, chunk_ids: list[int], detail: str = 'full') -> list[SearchResult]"
        - path: "tests/test_search/test_fts.py"
          exports:
            - "test_search_returns_ranked_results()"
            - "test_search_excludes_revoked()"
            - "test_search_filters_by_package()"
            - "test_search_summary_mode_excludes_content()"
            - "test_search_full_mode_includes_content()"
            - "test_search_deprecated_has_warning()"
            - "test_get_chunks_by_id()"
            - "test_search_empty_index()"
            - "test_search_no_match()"
      allowed_new_deps: []

    assumptions:
      - "FTS5 MATCH syntax: terms are implicitly ANDed. Use the query string directly — do not try to parse or transform it."
      - "bm25(chunks_fts) returns a NEGATIVE score (lower is better). Sort ORDER BY score ASC, or negate it for display."
      - "The Database class from chunk-04 provides access to the underlying sqlite3.Connection via a property or method. If not, the search function can accept a sqlite3.Connection directly."
      - "FTS5 MATCH will raise sqlite3.OperationalError on malformed queries (e.g. empty string). Catch and return an empty result list."
      - "The content field in SearchResult should be None when detail='summary' to save tokens. Only populate it when detail='full' or when using get_chunks_by_id."

    definition_of_done:
