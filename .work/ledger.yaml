  # ---------------------------------------------------------------------------
  - id: "chunk-04-storage-layer"
    title: "SQLite storage layer — schema, connection, CRUD"
    status: DONE
    depends_on: ["chunk-02-exceptions-and-models"]
    token_budget_hint: medium

    local_context: |
      Tank stores all imported documentation in a single SQLite database at
      .tank/index.db. This chunk creates the storage layer: connection management,
      schema creation, and basic CRUD operations.

      The schema is defined in docs/architecture.md under "Storage: SQLite Schema".
      There are three tables (packages, pages, chunks) and one FTS5 virtual table
      (chunks_fts) with triggers to keep it in sync.

      Key requirements:
        - WAL mode enabled on database creation
        - Busy timeout set to 5000ms
        - Schema created via a create_schema() function, not auto-migration
        - All imports wrapped in a single transaction (BEGIN/COMMIT)
        - The .tank/ directory is created if it doesn't exist

      The storage module is in src/tank/storage/db.py. It should expose a Database
      class that manages the connection and provides methods for importing packs
      and querying packages.

    objective: |
      Database class is callable. It creates .tank/index.db with the correct schema
      (all tables, FTS5 virtual table, triggers). WAL mode is enabled. Busy timeout
      is set. import_pack() inserts a pack with its pages and chunks in a single
      atomic transaction. get_packages() returns all imported packs. The FTS5
      triggers keep chunks_fts in sync automatically.

    interface_contract:
      inputs:
        - path: "src/tank/storage/models.py"
          consumes: [Pack, Page, Chunk]
        - path: "src/tank/errors.py"
          consumes: [TankError, ImportError_]
      outputs:
        - path: "src/tank/storage/db.py"
          exports:
            - |
              class Database:
                  def __init__(self, db_path: Path) -> None: ...
                  def create_schema(self) -> None: ...
                  def import_pack(self, pack: Pack, pages: list[Page], chunks: list[Chunk]) -> None: ...
                  def get_packages(self) -> list[Pack]: ...
                  def get_pack(self, name: str, version: str) -> Pack | None: ...
                  def pack_exists(self, name: str, version: str) -> bool: ...
                  def delete_pack(self, name: str, version: str) -> None: ...
                  def close(self) -> None: ...
        - path: "tests/test_storage/test_db.py"
          exports:
            - "test_create_schema_creates_all_tables()"
            - "test_wal_mode_enabled()"
            - "test_busy_timeout_set()"
            - "test_import_pack_inserts_all_records()"
            - "test_import_pack_is_atomic()"
            - "test_import_duplicate_pack_raises()"
            - "test_get_packages_returns_all()"
            - "test_get_pack_not_found_returns_none()"
            - "test_delete_pack_removes_all_related()"
            - "test_fts5_trigger_populates_on_insert()"
            - "test_fts5_trigger_cleans_on_delete()"
            - "test_tank_directory_created_if_missing()"
      allowed_new_deps: []

    assumptions:
      - "sqlite3 is available in Python 3.11+ stdlib with FTS5 support compiled in. This is true for all standard CPython distributions."
      - "WAL mode is set via: connection.execute('PRAGMA journal_mode=WAL')"
      - "Busy timeout is set via: connection.execute('PRAGMA busy_timeout=5000')"
      - "FTS5 content-sync triggers must use the special 'delete' command: INSERT INTO chunks_fts(chunks_fts, rowid, summary, content) VALUES ('delete', old.id, old.summary, old.content)"
      - "The Database class manages a single sqlite3.Connection. It is not thread-safe — callers must not share instances across threads."
      - "import_pack should raise ImportError_ if a pack with the same (name, version) already exists, unless force=True is passed."
      - "The .tank/ directory path is derived from the db_path parent: if db_path is '/project/.tank/index.db', create '/project/.tank/' if it doesn't exist."
      - "connection.row_factory = sqlite3.Row is useful for mapping query results to dataclasses."

