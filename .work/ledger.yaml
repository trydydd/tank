  # ---------------------------------------------------------------------------
  - id: "chunk-03-normalizer"
    title: "Content normalizer"
    status: DONE
    depends_on: ["chunk-02-exceptions-and-models"]
    token_budget_hint: medium

    local_context: |
      The normalizer is the most critical shared component in Tank. It transforms
      raw chunk content into a canonical form before hashing. The same function is
      called at build time (to compute normalized_content_hash) and at verify time
      (to recompute and compare). If these two calls ever produce different output
      for the same input, hash verification breaks for all .ctx packs.

      The normalizer lives at src/tank/builder/normalizer.py. Even though it is in
      the builder package, the validator will also import it — this is the one
      allowed cross-boundary import (documented in taboo NO_MODULE_BOUNDARY_VIOLATIONS).

      Normalization rules (from docs/architecture.md Token Efficiency section):
        1. Collapse runs of blank lines to a single blank line
        2. Strip HTML tags (basic tag removal for MVP — no boilerplate detection)
        3. Normalize Unicode whitespace to ASCII spaces
        4. Preserve code block formatting exactly (content inside ``` fences is untouched)
        5. Preserve table formatting
        6. Strip leading/trailing whitespace per chunk
        7. Normalize Unicode to NFC form

      The critical invariant: content inside fenced code blocks (``` ... ```) must
      pass through COMPLETELY unchanged. No whitespace collapsing, no Unicode
      normalization, no HTML stripping. Only prose outside code fences is normalized.

    objective: |
      normalize(content: str) -> str is callable, deterministic, and correctly
      applies all normalization rules. Content inside fenced code blocks is
      preserved verbatim. The function is tested with prose, code blocks, mixed
      content, edge cases (nested fences, empty input, all-code input, Unicode),
      and error paths.

    interface_contract:
      inputs:
        - path: "src/tank/errors.py"
          consumes: [TankError]
      outputs:
        - path: "src/tank/builder/normalizer.py"
          exports:
            - "def normalize(content: str) -> str"
        - path: "tests/test_builder/test_normalizer.py"
          exports:
            - "test_collapse_blank_lines()"
            - "test_strip_html_tags()"
            - "test_normalize_unicode_whitespace()"
            - "test_preserve_fenced_code_blocks()"
            - "test_preserve_tables()"
            - "test_strip_leading_trailing_whitespace()"
            - "test_unicode_nfc_normalization()"
            - "test_mixed_prose_and_code()"
            - "test_nested_code_fences()"
            - "test_empty_input()"
            - "test_all_code_input()"
            - "test_deterministic_output()"
      allowed_new_deps: []

    assumptions:
      - "Python's unicodedata.normalize('NFC', ...) is the correct function for Unicode NFC normalization."
      - "Fenced code blocks start with a line beginning with ``` (optionally followed by a language identifier) and end with a line that is exactly ``` (no trailing text). Indented code blocks (4 spaces) are NOT treated as code fences for normalization purposes — they get normalized like prose."
      - "HTML tag stripping for MVP is simple regex: remove anything matching <[^>]+>. This will incorrectly strip angle brackets in code blocks, but code blocks are excluded from normalization, so this only affects prose containing literal HTML-like strings outside code blocks."
      - "Table formatting means: lines starting with | are left unchanged (whitespace between | characters is not collapsed)."
      - "'Collapse runs of blank lines' means: replace sequences of 2+ consecutive newlines (possibly with whitespace-only lines between them) with exactly two newlines (one blank line)."
      - "The function takes a single string (the full chunk content) and returns a single string. It does not operate on lists of chunks."

