  # ---------------------------------------------------------------------------
  - id: "chunk-05-policy-engine"
    title: "Policy engine — TOML loading and lifecycle enforcement"
    status: DONE
    depends_on: ["chunk-02-exceptions-and-models"]
    token_budget_hint: small

    local_context: |
      The policy engine loads policy.toml files and evaluates whether a pack's
      lifecycle_state is allowed. It is used by both `tank verify` and `tank pull`.

      Policy file format (from docs/architecture.md):
        [policy]
        require_signatures = false
        require_attribution = true
        allowed_lifecycle_states = ["approved", "deprecated"]
        rejected_doc_version_statuses = ["archived"]

      Lookup order (first file found wins):
        1. Explicit path passed via --policy flag
        2. .tank/policy.toml in cwd
        3. ~/.tank/policy.toml
        4. Built-in permissive defaults (all states except revoked, no signatures required)

      The engine lives in src/tank/policy/engine.py. It parses TOML using stdlib
      tomllib (Python 3.11+), applies the lookup order, and evaluates a pack's
      metadata against the loaded policy.

    objective: |
      Policy class loads a policy.toml from the lookup chain. evaluate() checks a
      pack's lifecycle_state and doc_version_status against the loaded policy and
      returns a PolicyResult with pass/fail and a human-readable reason. Built-in
      defaults are used when no policy file exists.

    interface_contract:
      inputs:
        - path: "src/tank/errors.py"
          consumes: [PolicyError]
      outputs:
        - path: "src/tank/policy/engine.py"
          exports:
            - |
              @dataclass
              class PolicyResult:
                  allowed: bool
                  reason: str
            - |
              class Policy:
                  def __init__(self, require_signatures: bool, require_attribution: bool,
                               allowed_lifecycle_states: list[str],
                               rejected_doc_version_statuses: list[str]) -> None: ...
                  @classmethod
                  def load(cls, policy_path: Path | None = None, project_dir: Path | None = None) -> "Policy": ...
                  @classmethod
                  def default(cls) -> "Policy": ...
                  def evaluate(self, lifecycle_state: str, doc_version_status: str) -> PolicyResult: ...
        - path: "tests/test_policy/test_engine.py"
          exports:
            - "test_load_from_explicit_path()"
            - "test_load_from_project_dir()"
            - "test_load_from_user_dir()"
            - "test_load_falls_back_to_defaults()"
            - "test_default_policy_allows_approved()"
            - "test_default_policy_allows_deprecated()"
            - "test_default_policy_rejects_revoked()"
            - "test_evaluate_rejects_disallowed_state()"
            - "test_evaluate_rejects_archived_doc_status()"
            - "test_evaluate_passes_valid_pack()"
            - "test_invalid_toml_raises_policy_error()"
        - path: "tests/test_policy/__init__.py"
          exports: []
      allowed_new_deps: []

    assumptions:
      - "tomllib.load() reads a binary file object. Open policy files with open(path, 'rb')."
      - "tomllib raises tomllib.TOMLDecodeError on invalid TOML. Catch this and re-raise as PolicyError."
      - "The policy file is a flat [policy] table. There are no nested profiles in MVP."
      - "The default policy allows ['draft', 'approved', 'deprecated'] and rejects ['revoked']. rejected_doc_version_statuses defaults to empty list."
      - "~/.tank/ is resolved via Path.home() / '.tank' / 'policy.toml'."
      - "If policy_path is provided but the file doesn't exist, raise PolicyError (don't fall through to defaults)."

    definition_of_done:
      automated:
        - cmd: "pytest tests/test_policy/test_engine.py -v"
          must_pass: true
        - cmd: "mypy src/tank/policy/engine.py"
          must_pass: true
        - cmd: "ruff check src/tank/policy/engine.py"
          must_pass: true
      coverage_floor: null
      manual_checklist:
        - "tomllib used, not tomli or toml third-party packages"
        - "Lookup order matches docs/architecture.md exactly"
        - "Default policy rejects 'revoked' but allows everything else"

    capability_ceiling:
      - "Do not implement per-profile policies or policy inheritance. MVP is a single flat policy."
      - "Do not implement signature verification logic. This chunk only checks whether signatures are required; actual verification is in the validator."
      - "Do not add CLI argument parsing. The Policy.load() takes a Path — the CLI will provide it."

    prerequisites:
      read_first:
        - progress.txt
        - docs/architecture.md

    review_targets:
      - "Policy.load(policy_path=Path('nonexistent.toml')) raises PolicyError — not a silent fallback"
      - "Policy.default() allows 'draft', 'approved', 'deprecated' and rejects 'revoked'"
      - "Lookup order tested: explicit path > .tank/policy.toml > ~/.tank/policy.toml > defaults"
      - "Invalid TOML input raises PolicyError with a descriptive message"

    rollback_anchor:
      git_ref: ""
      file_checksums: {}

    handoff:
      status_note: "All 12 tests pass. Policy.load respects lookup order (explicit > project > user > defaults). Default policy allows draft/approved/deprecated, rejects revoked. evaluate() checks lifecycle + doc_version_status independently. Invalid/nonexistent TOML raises PolicyError."
      files_modified:
