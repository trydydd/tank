  # ---------------------------------------------------------------------------
  - id: "chunk-10-mcp-server"
    title: "MCP server — query-docs and resolve-deps tools"
    status: DONE
    depends_on: ["chunk-06-search-layer", "chunk-04-storage-layer"]
    token_budget_hint: medium

    local_context: |
      The MCP server exposes Tank's search and index health check to AI coding
      agents. It runs over stdio (default) or HTTP (localhost only).

      Two tools (from docs/architecture.md MCP Tool Surface):
        - resolve-deps: read-only health check. Lists imported packs with state.
        - query-docs: FTS5 search with attribution. Supports summary/full detail
          levels and chunk_ids for targeted retrieval.

      The server uses the official Anthropic MCP Python SDK (`mcp` package).
      It lives in src/tank/server.py and is invoked as: python -m tank.server

      The MCP SDK provides decorators for registering tools. Each tool receives
      typed input and returns typed output.

    objective: |
      The MCP server starts over stdio. resolve-deps returns the list of imported
      packs from the database. query-docs performs FTS5 search and returns
      attributed results. Both tools work correctly. The server is testable.

    interface_contract:
      inputs:
        - path: "src/tank/storage/db.py"
          consumes: [Database]
        - path: "src/tank/search/fts.py"
          consumes: [search, get_chunks_by_id, SearchResult]
        - path: "src/tank/storage/models.py"
          consumes: [Pack]
      outputs:
        - path: "src/tank/server.py"
          exports:
            - "# MCP server with query-docs and resolve-deps tools"
            - "# Invokable as: python -m tank.server"
        - path: "src/tank/__main__.py"
          exports:
            - "# enables python -m tank.server"
        - path: "tests/test_server.py"
          exports:
            - "test_resolve_deps_returns_packs()"
            - "test_resolve_deps_empty_index()"
            - "test_query_docs_summary_mode()"
            - "test_query_docs_full_mode()"
            - "test_query_docs_chunk_ids()"
            - "test_query_docs_not_indexed_package()"
            - "test_query_docs_deprecated_warning()"
            # Negative tests:
            - "test_http_does_not_bind_external()  # NEG: HTTP transport must bind to 127.0.0.1 only — verify bind address in code, never 0.0.0.0 or ''"
            - "test_query_docs_does_not_return_revoked()  # NEG: import a pack, set lifecycle_state='revoked' in DB, query-docs must return zero results for that pack"
            - "test_resolve_deps_does_not_omit_deprecated()  # NEG: deprecated packs are valid and must appear in resolve-deps — they are not excluded like revoked packs"
      allowed_new_deps: []

    assumptions:
      - "The MCP Python SDK provides a Server class and @server.tool() decorator for registering tools. Check the actual mcp package API — if it differs, adapt accordingly."
      - "stdio transport is the default. The server reads JSON-RPC from stdin and writes to stdout."
      - "For testing, the MCP server's tool functions can be extracted and tested directly without running the full server. Test the underlying functions, not the transport layer."
      - "The server creates a Database instance on startup, pointing to .tank/index.db in the current working directory (or a configurable path)."
      - "HTTP transport (--http flag) uses the MCP SDK's built-in HTTP server. Bind to 127.0.0.1 only — never 0.0.0.0."
      - "query-docs output format matches the JSON in docs/architecture.md MCP Tool Surface section."
      - "resolve-deps output includes: status, packs list with package, version, lifecycle_state, doc_version_status, chunks count, indexed_at."

    definition_of_done:
      automated:
        - cmd: "pytest tests/test_server.py -v"
          must_pass: true
        - cmd: "mypy src/tank/server.py"
          must_pass: true
        - cmd: "ruff check src/tank/server.py"
          must_pass: true
      coverage_floor: null
      manual_checklist:
        - "python -m tank.server starts without error (manual check)"
        - "Tool output JSON matches the schema in docs/architecture.md"
        - "HTTP transport binds to 127.0.0.1 only — verified in code review"

    capability_ceiling:
      - "Do not implement the index-deps tool. It is deferred to Phase 2."
      - "Do not implement authentication or authorization on the HTTP transport."
      - "Do not bind to 0.0.0.0 or any external interface. 127.0.0.1 only."
      - "If the MCP SDK API does not match assumptions, stop and flag as open_question."

    prerequisites:
      read_first:
        - progress.txt
        - docs/architecture.md

    review_targets:
      - target: "resolve-deps returns correct pack count and metadata"
        verified_by: "test_resolve_deps_returns_packs"
        assertion: "Import 2 packs, call resolve-deps — response contains 2 entries with correct package, version, lifecycle_state, chunk count"
      - target: "query-docs summary mode excludes content"
        verified_by: "test_query_docs_summary_mode"
        assertion: "Call query-docs with detail='summary' — results have heading_path and summary but no content field (or content is null)"
      - target: "query-docs with chunk_ids returns full content"
        verified_by: "test_query_docs_chunk_ids"
        assertion: "Call query-docs with chunk_ids=[1,2] and detail='full' — results include content field for each chunk"
      - target: "Empty database returns appropriate empty results"
        verified_by: "test_resolve_deps_empty_index"
        assertion: "resolve-deps on empty DB returns {status: 'ok', packs: []}, not an error"

    verification_inputs:
      - function: "resolve-deps output format"
        cases:
          - input: "Database with 1 pack: my-lib@1.0.0, approved, 5 chunks"
            expected: "{status: 'ok', packs: [{package: 'my-lib', version: '1.0.0', lifecycle_state: 'approved', chunks: 5, ...}]}"
            label: "Output matches architecture.md MCP Tool Surface schema"
      - function: "query-docs deprecated warning"
        cases:
          - input: "Query matching a chunk from a deprecated pack"
            expected: "Result includes lifecycle_warning field with deprecation message"
            label: "Deprecated packs carry lifecycle_warning in MCP output"

    negative_tests:
      - test_name: "test_http_does_not_bind_external"
        description: "If HTTP transport is implemented, it must bind to 127.0.0.1 only. Verify the bind address in the server code — never 0.0.0.0 or ''. This is a hard security constraint from architecture.md."
        must_not: "Server binds to '0.0.0.0', '', or any non-loopback address"
      - test_name: "test_query_docs_does_not_return_revoked"
        description: "Import a pack, update its lifecycle_state to 'revoked' in the DB, call query-docs — must return zero results for that pack's content."
        must_not: "Any result with lifecycle_state='revoked' in query-docs output"
      - test_name: "test_resolve_deps_does_not_omit_deprecated"
        description: "Deprecated packs are valid and should appear in resolve-deps output — they are not excluded like revoked packs are from search."
        must_not: "A deprecated pack missing from resolve-deps output"

    rollback_anchor:
      git_ref: ""
      file_checksums: {}

    handoff:
      status_note: "Reviewer fixed five issues: (1) Critical: Database import was behind TYPE_CHECKING — tool wrappers would NameError at runtime; moved to unconditional import. (2) Double .tank nesting in _db_path when project_path is set — collapsed _DEFAULT_DB_DIR/_DEFAULT_DB_FILE into single _DEFAULT_DB_PATH. (3) run_http didn't pass host to FastMCP — now explicitly passes host=_HTTP_HOST. (4) Tool names were resolve_deps_tool/query_docs_tool — fixed to resolve-deps/query-docs via name= parameter matching architecture.md. (5) Eliminated tool registration duplication via _register_tools helper. All 10 tests pass, mypy clean, ruff clean, 128/128 full suite."
      files_modified:
        - "src/tank/server.py"
        - "tests/test_server.py"
      open_questions: []
      progress_log_updated: true

    review:
      outcome: "PASSED"
      rejection_reason: ""
      reviewed_at: "2026-05-19"


  # ---------------------------------------------------------------------------
  - id: "chunk-11-integration-tests"
    title: "End-to-end integration tests"
    status: DONE
    depends_on: ["chunk-09-cli-commands", "chunk-10-mcp-server"]
    token_budget_hint: medium

    local_context: |
      This chunk adds integration tests that exercise the full MVP pipeline:
      build → verify → pull → query. These tests use the CLI commands (via
      CliRunner) and real .ctx files, not mocked components.

      The integration tests verify the MVP success criteria from docs/architecture.md:
        1. tank build produces a valid .ctx archive
        2. tank verify rejects unsafe/invalid packs
        3. tank pull imports atomically after verification
        4. tank query returns BM25-ranked results with attribution
        5. The MCP server tools return correct results

      Test fixtures: a tests/fixtures/sample_docs/ directory with a realistic
      multi-file documentation tree (should already exist from chunk-07).

    objective: |
      A test suite that exercises the full build → verify → pull → query pipeline
      end-to-end. Covers the golden path and key failure paths. All MVP success
      criteria from the architecture are verified.

    interface_contract:
      inputs:
        - path: "src/tank/cli/main.py"
          consumes: [cli]
        - path: "src/tank/server.py"
          consumes: []
        - path: "tests/fixtures/sample_docs/"
          consumes: []
      outputs:
        - path: "tests/test_integration.py"
          exports:
            - "test_full_pipeline_build_verify_pull_query()"
            - "test_build_then_verify_passes()"
            - "test_build_then_tamper_then_verify_fails()"
            - "test_pull_populates_fts_index()"
            - "test_query_returns_attributed_results()"
            - "test_query_progressive_disclosure()"
            - "test_pull_writes_lockfile()"
            - "test_pull_duplicate_rejected()"
            - "test_revoked_pack_excluded_from_query()"
            # Negative tests:
            - "test_pull_does_not_leave_partial_state_on_failure()  # NEG: failed import must leave zero rows — transaction must roll back completely"
            - "test_revoked_pack_not_in_query_results()  # NEG: import pack, set lifecycle='revoked' in DB, query must return zero results for that pack"
            - "test_build_verify_cycle_is_symmetric()  # NEG: build_pack() output must always pass verify() with default policy — if not, build and verify are inconsistent"
      allowed_new_deps: []

    assumptions:
      - "click.testing.CliRunner works for integration testing — it invokes the full command pipeline."
      - "Each test creates its own temporary directory (via tmp_path fixture) for .tank/ and output files. Tests do not share state."
      - "The sample_docs fixture from chunk-07 provides enough content for meaningful FTS5 search results."
      - "To test tampering: build a .ctx, then modify a file inside it using zipfile, and verify that verify catches it."
      - "To test revoked pack exclusion: import a pack, manually update its lifecycle_state to 'revoked' in the database, then verify search excludes it."

    definition_of_done:
      automated:
        - cmd: "pytest tests/test_integration.py -v"
          must_pass: true
        - cmd: "mypy tests/test_integration.py"
          must_pass: true
      coverage_floor: null
      manual_checklist:
        - "Full pipeline test covers build → verify → pull → query in sequence"
        - "No test depends on state from another test (each uses its own tmp_path)"
        - "At least one test verifies tamper detection end-to-end"

    capability_ceiling:
      - "Do not test Phase 2 or Phase 3 features. MVP only."
      - "Do not test MCP transport (stdio/HTTP). Test the underlying tool functions."
      - "Do not modify any core module code. If a test reveals a bug, flag it as open_question."

    prerequisites:
      read_first:
        - progress.txt
        - docs/architecture.md

    review_targets:
      - target: "Full pipeline: build → verify → pull → query in one test"
        verified_by: "test_full_pipeline_build_verify_pull_query"
        assertion: "Build from fixture docs, verify passes, pull succeeds, query returns results with correct package name and source_url"
      - target: "Tamper detection catches modified chunk content"
        verified_by: "test_build_then_tamper_then_verify_fails"
        assertion: "Modify a chunk's content in the .ctx after build — verify returns VerifyResult(passed=False, step=7)"
      - target: "Progressive disclosure: summary then full retrieval"
        verified_by: "test_query_progressive_disclosure"
        assertion: "Query with detail='summary' returns results without content, then query with chunk_ids and detail='full' returns content for those IDs"
      - target: "Lockfile written after pull"
        verified_by: "test_pull_writes_lockfile"
        assertion: ".tank/index.lock exists after pull, contains the pack's name, version, and pack_digest"

    verification_inputs:
      - function: "full pipeline"
        cases:
          - input: "sample_docs/ fixture with 2+ markdown files"
            expected: "build exits 0, .ctx file created, verify returns passed=True, pull exits 0, query for a known term returns results with attribution"
            label: "Golden path end-to-end"
      - function: "tamper detection"
        cases:
          - input: ".ctx file with one chunk's content modified after build"
            expected: "verify returns VerifyResult(passed=False, step=7) — content hash mismatch, not pack_digest mismatch"
            label: "Content tampering caught at step 7 specifically"

    negative_tests:
      - test_name: "test_pull_does_not_leave_partial_state_on_failure"
        description: "If import fails mid-transaction (e.g. simulate by importing a pack that violates a constraint), the database must contain zero records from that import — the transaction rolled back."
        must_not: "Any packages/pages/chunks rows from the failed import present in the database"
      - test_name: "test_revoked_pack_not_in_query_results"
        description: "Import a pack, update its lifecycle_state to 'revoked' in the DB, run tank query — zero results for that pack's content."
        must_not: "Any query result with package name matching the revoked pack"
      - test_name: "test_build_verify_cycle_is_symmetric"
        description: "A .ctx file produced by build_pack() must always pass verify() with default policy. If this test fails, the build and verify code paths are inconsistent."
        must_not: "verify(build_pack(...)) returns passed=False"

    rollback_anchor:
      git_ref: ""
      file_checksums: {}

    handoff:
      status_note: "All 13 tests pass (pytest -v) and mypy strict passes clean. Fixed two executor-specific gotchas: CliRunner doesn't accept cwd= (use os.chdir wrapper), and tamper tests must recompute pack_digest after modifying content. Test file covers all golden path, negative, and verification_inputs cases from the ledger contract."
      files_modified:
        - tests/test_integration.py
      open_questions: []
      progress_log_updated: true

    review:
      outcome: "PASSED"
      rejection_reason: ""
      reviewed_at: "2026-05-19"
