name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[all]" -q
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy src/
      - run: pytest tests/ --network

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[all]" build -q

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Build packs
        run: |
          mkdir -p source packs
          curl -sf --max-time 120 -o source/llms-full.md https://gofastmcp.com/llms-full.txt
          synthesist build fastmcp@3.3.0 --source ./source --output ./packs 2>/dev/null

      - name: Extract changelog notes
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          # Write to a file to avoid quoting issues
          echo "$NOTES" > release_notes.md
          echo "Release notes for $VERSION:"
          cat release_notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            dist/*.whl
            dist/*.tar.gz
            packs/*.ctx

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # Required for OIDC trusted publisher
    environment:
      name: pypi
      url: https://pypi.org/p/tank-ctx
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
